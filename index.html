<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px;}
input { padding:8px; margin:10px 0; width:300px;}
button { padding:6px 10px; margin:5px; cursor:pointer;}
table { width:100%; border-collapse: collapse;}
th,td { border:1px solid #334155; padding:8px;}
th { cursor:pointer; background:#1e293b;}
.card { background:#1e293b; padding:10px; margin:10px 0; border-radius:10px;}
</style>
</head>

<body>

<h2>📊 Dashboard</h2>
<a href="admin.html"><button>⚙️ Admin Panel</button></a>

<br>
<input id="search" placeholder="Search...">
<button onclick="toggleView()">Toggle View</button>

<div id="tableView"></div>
<div id="cardView" style="display:none"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx9kttMX7Q4792PSYQaE--6TR2pM1EW87JaEw7iWoR8dfjMI-ZrSyLPxr-dnardgEyJuQ/exec";

let data=[], headers=[], isTable=true;

async function load(){
  const res = await fetch(API);
  const json = await res.json();

  headers = json[0];
  data = json.slice(1);

  render();
}

function render(){
  renderTable(data);
  renderCards(data);
}

function renderTable(d){
  let html="<table><tr>";
  headers.forEach(h=> html+=`<th onclick="sort('${h}')">${h}</th>`);
  html+="</tr>";

  d.forEach(r=>{
    html+="<tr>";
    headers.forEach((h,i)=>{
      if(i===headers.length-1){
        html+=`<td><a href="${r[i]}" target="_blank"><button>PDF</button></a></td>`;
      } else {
        html+=`<td>${r[i]}</td>`;
      }
    });
    html+="</tr>";
  });

  html+="</table>";
  document.getElementById("tableView").innerHTML=html;
}

function renderCards(d){
  let html="";
  d.forEach(r=>{
    html+=`<div class="card">`;
    headers.forEach((h,i)=>{
      if(i===headers.length-1){
        html+=`<a href="${r[i]}" target="_blank"><button>Open PDF</button></a>`;
      } else {
        html+=`<p><b>${h}:</b> ${r[i]}</p>`;
      }
    });
    html+=`</div>`;
  });
  document.getElementById("cardView").innerHTML=html;
}

function toggleView(){
  isTable=!isTable;
  document.getElementById("tableView").style.display=isTable?"block":"none";
  document.getElementById("cardView").style.display=isTable?"none":"block";
}

function sort(col){
  const index = headers.indexOf(col);
  data.sort((a,b)=> (a[index]||"").localeCompare(b[index]||""));
  render();
}

document.getElementById("search").addEventListener("input",e=>{
  const val=e.target.value.toLowerCase();
  const filtered=data.filter(r=>r.some(v=>String(v).toLowerCase().includes(val)));
  renderTable(filtered);
  renderCards(filtered);
});

setInterval(load,30000);
load();
</script>

</body>
</html>
