<!-- /index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sheet Viewer</title>

  <style>
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 8px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th {
      background: #334155;
    }

    tr:hover {
      background: #475569;
    }

    .status {
      margin-bottom: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>📊 Live Sheet Data</h1>
  <div class="status" id="status">Loading...</div>
  <input type="text" id="search" placeholder="Search..." />

  <table id="table">
    <thead></thead>
    <tbody></tbody>
  </table>

  <script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQC1s8OV_Te8GtcwqbQRGfQyATRX0tyTX2rDjKuA74YB9W5yx3A2Ur77VkDMMZK3CSo-kgW-XuyHvDl/pub?gid=1660623033&single=true&output=csv";

    let rawData = [];

    async function fetchCSV() {
      try {
        document.getElementById("status").innerText = "Fetching data...";

        const res = await fetch(CSV_URL);
        const text = await res.text();

        rawData = parseCSV(text);
        renderTable(rawData);

        document.getElementById("status").innerText = 
          `Updated: ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        document.getElementById("status").innerText = "Error loading data";
        console.error(err);
      }
    }

    function parseCSV(text) {
      const rows = text.trim().split("\n").map(r => r.split(","));
      const headers = rows.shift();

      return rows.map(row => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = row[i]);
        return obj;
      });
    }

    function renderTable(data) {
      const tableHead = document.querySelector("#table thead");
      const tableBody = document.querySelector("#table tbody");

      tableHead.innerHTML = "";
      tableBody.innerHTML = "";

      if (!data.length) return;

      const headers = Object.keys(data[0]);

      // Header
      const headerRow = document.createElement("tr");
      headers.forEach(h => {
        const th = document.createElement("th");
        th.innerText = h;
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      // Body
      data.forEach(row => {
        const tr = document.createElement("tr");
        headers.forEach(h => {
          const td = document.createElement("td");
          td.innerText = row[h];
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });
    }

    // Search filter
    document.getElementById("search").addEventListener("input", e => {
      const val = e.target.value.toLowerCase();

      const filtered = rawData.filter(row =>
        Object.values(row).some(v =>
          String(v).toLowerCase().includes(val)
        )
      );

      renderTable(filtered);
    });

    // Auto refresh every 30 sec
    setInterval(fetchCSV, 30000);

    fetchCSV();
  </script>

</body>
</html>
