<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ongoing Sites – Naranpura Ward</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --card: #1a2235;
      --border: #1e2d45;
      --accent: #f59e0b;
      --accent2: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --pill-naranpura: #1e3a5f;
      --pill-memnagar: #1e4a3a;
      --badge-n: #3b82f6;
      --badge-m: #10b981;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0d1b2a 0%, #0b1622 60%, #0f1e33 100%);
      border-bottom: 2px solid var(--accent);
      padding: 28px 32px 22px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    .header-icon {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(245,158,11,0.35);
    }

    .header-text h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.85rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .header-text p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 3px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.4);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── CONTROLS ── */
    .controls {
      max-width: 1200px;
      margin: 28px auto 0;
      padding: 0 24px;
    }

    /* Filter pills ABOVE search */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .filter-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filter-btn:hover { border-color: var(--accent2); color: var(--text); }

    .filter-btn.active {
      background: var(--accent2);
      border-color: var(--accent2);
      color: #fff;
      font-weight: 600;
    }

    .filter-btn.active.naranpura { background: #1d4ed8; border-color: #3b82f6; }
    .filter-btn.active.memnagar  { background: #059669; border-color: #10b981; }

    /* Search bar */
    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 14px 18px 14px 46px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0 0;
    }

    #resultCount {
      font-size: 0.82rem;
      color: var(--muted);
    }

    #resultCount span { color: var(--accent); font-weight: 600; }

    /* ── GRID ── */
    .grid {
      max-width: 1200px;
      margin: 20px auto 40px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--badge-n);
      border-radius: 16px 0 0 16px;
    }

    .card.memnagar::before { background: var(--badge-m); }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.5);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-sr {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .tp-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .tp-badge.naranpura {
      background: rgba(59,130,246,0.15);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3);
    }

    .tp-badge.memnagar {
      background: rgba(16,185,129,0.15);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }

    .file-number {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .address {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .plot-info {
      font-size: 0.77rem;
      color: var(--muted);
    }

    .plot-info strong { color: var(--text); font-size: 0.82rem; }

    .view-btn {
      font-size: 0.78rem;
      color: var(--accent2);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.8;
    }

    /* ── NO RESULTS ── */
    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .no-results .emoji { font-size: 3rem; margin-bottom: 12px; }
    .no-results p { font-size: 1.1rem; }

    /* ── MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }

    .overlay.open { display: flex; animation: fadeIn 0.2s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
      animation: slideUp 0.25s ease;
      position: relative;
    }

    @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    .modal-header {
      padding: 24px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
    }

    .modal-subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

    .close-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      color: var(--muted);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .close-btn:hover { background: #ef4444; border-color: #ef4444; color: #fff; }

    .modal-body { padding: 20px 24px 24px; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .detail-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .detail-item.full { grid-column: 1 / -1; }

    .detail-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 5px;
      font-family: 'Rajdhani', sans-serif;
    }

    .detail-value {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 400;
      line-height: 1.4;
      word-break: break-word;
    }

    .detail-value.highlight {
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .pdf-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(29,78,216,0.4);
    }

    .pdf-btn:hover {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      box-shadow: 0 6px 24px rgba(29,78,216,0.6);
      transform: translateY(-1px);
    }

    /* scrollbar */
    .modal::-webkit-scrollbar { width: 6px; }
    .modal::-webkit-scrollbar-track { background: transparent; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* responsive */
    @media (max-width: 600px) {
      header { padding: 18px 16px; gap: 12px; }
      .header-text h1 { font-size: 1.3rem; }
      .header-badge { display: none; }
      .controls, .grid { padding: 0 14px; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .detail-grid { grid-template-columns: 1fr; }
      .modal { max-height: 95vh; border-radius: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-icon">🏗️</div>
  <div class="header-text">
    <h1>ONGOING SITES IN NARANPURA</h1>
    <p>Ahmedabad Municipal Corporation — West Zone</p>
  </div>
  <div class="header-badge" id="totalBadge">43 Sites</div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <div class="filter-row">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">All Sites</button>
    <button class="filter-btn naranpura" id="btnNaranpura" onclick="setFilter('naranpura')">29 – Naranpura</button>
    <button class="filter-btn memnagar" id="btnMemnagar" onclick="setFilter('memnagar')">19 – Memnagar</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search by address, file number, case number, plot number…" oninput="doSearch()"/>
  </div>
  <div class="stats-row">
    <div id="resultCount">Showing <span id="countNum">43</span> of 43 sites</div>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="cardGrid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-subtitle" id="mSubtitle"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="mGrid"></div>
      <a id="pdfLink" class="pdf-btn" target="_blank" rel="noopener">
        📄 &nbsp; VIEW RAJACHITTHI PDF
      </a>
    </div>
  </div>
</div>

<script>
const DATA = [];

let activeFilter = 'all';
let searchTerm   = '';

function getZone(item) {
  return item['T.P SCHEME NUMBER'].includes('19') ? 'memnagar' : 'naranpura';
}

function getFiltered() {
  return DATA.filter(d => {
    const zone = getZone(d);
    const matchFilter = activeFilter === 'all' || zone === activeFilter;
    const q = searchTerm.toLowerCase();
    const matchSearch = !q || Object.values(d).some(v => String(v).toLowerCase().includes(q));
    return matchFilter && matchSearch;
  });
}
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    DATA = data;
    renderCards();
  })
  .catch(err => {
    console.error("Error loading JSON:", err);
  });
function renderCards() {
  const grid = document.getElementById('cardGrid');
  const filtered = getFiltered();
  document.getElementById('countNum').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results"><div class="emoji">🔎</div><p>Koi bhi site nahi mili. Search ya filter change karo.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((d, i) => {
    const zone = getZone(d);
    const badgeClass = zone === 'memnagar' ? 'memnagar' : 'naranpura';
    const badgeLabel = zone === 'memnagar' ? 'TP 19 – Memnagar' : 'TP 29 – Naranpura';
    return `
      <div class="card ${zone}" onclick="openModal(${d['SR.']-1})" style="animation-delay:${i*0.03}s">
        <div class="card-header">
          <span class="card-sr">SR. ${d['SR.']}</span>
          <span class="tp-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <div class="file-number">${d['FILE NUMBER']}</div>
        <div class="address">${d['ADDRESS']}</div>
        <div class="card-footer">
          <div class="plot-info">Plot: <strong>${d['FINAL PLOT NUMBER']}</strong></div>
          <div class="view-btn">Details ›</div>
        </div>
      </div>`;
  }).join('');
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + f.charAt(0).toUpperCase() + f.slice(1)).classList.add('active');
  renderCards();
}

function doSearch() {
  searchTerm = document.getElementById('searchInput').value;
  renderCards();
}

function openModal(idx) {
  const d = DATA[idx];
  const zone = getZone(d);
  document.getElementById('mTitle').textContent = d['FILE NUMBER'];
  document.getElementById('mSubtitle').textContent = d['ADDRESS'];

  const fields = [
    ['SR. Number', d['SR.'], false],
    ['File Number', d['FILE NUMBER'], true],
    ['T.P Scheme', d['T.P SCHEME NUMBER'], false],
    ['Final Plot No.', d['FINAL PLOT NUMBER'], true],
    ['Case Number', d['CASE NUMBER'], false],
    ['Rajachitthi No.', d['RAJACHITHHI NUMBER'], false],
    ['Issued Date', d['RAJACHITHHI ISSUED DATE'], false],
    ['Sub Plot / Tena', d['SUB PLOT NUMBER/ TENA NUMBER'], false],
    ['Block Number', d['BLOCK NUMBER'], false],
    ['Total Blocks', d['TOTAL BLOCKS'], false],
    ['Address', d['ADDRESS'], false],
  ];

  document.getElementById('mGrid').innerHTML = fields.map(([label, val, hl]) => {
    const full = (label === 'Case Number' || label === 'Address') ? ' full' : '';
    return `
      <div class="detail-item${full}">
        <div class="detail-label">${label}</div>
        <div class="detail-value${hl ? ' highlight' : ''}">${val}</div>
      </div>`;
  }).join('');

  document.getElementById('pdfLink').href = d['PDF OF RAJACHITTHI'];
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('overlay') && !e.target.classList.contains('close-btn')) return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });

</script>
</body>
</html>
