<script>
const API = "https://script.google.com/macros/s/AKfycbx9kttMX7Q4792PSYQaE--6TR2pM1EW87JaEw7iWoR8dfjMI-ZrSyLPxr-dnardgEyJuQ/exec";

let headers=[], data=[];

async function load(){
  const res = await fetch(API);
  const json = await res.json();

  headers = json[0];
  data = json.slice(1);

  render();
}

function render(){
  let html="<tr>";
  headers.forEach(h=> html+=`<th>${h}</th>`);
  html+="<th>Action</th></tr>";

  data.forEach((row,i)=>{
    html+="<tr>";
    row.forEach((cell,j)=>{
      html+=`<td><input value="${cell}" onchange="update(${i},${j},this.value)"></td>`;
    });
    html+=`
      <td>
        <button onclick="save(${i})">💾</button>
        <button onclick="del(${i})">❌</button>
      </td>`;
    html+="</tr>";
  });

  document.getElementById("table").innerHTML=html;
}

function update(i,j,val){
  data[i][j]=val;
}

async function save(i){
  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"update",
      rowIndex:i+1,
      row:data[i]
    })
  });
  alert("Updated");
}

async function addRow(){
  let newRow = Array(headers.length).fill("");

  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"add",
      row:newRow
    })
  });

  load();
}

async function del(i){
  await fetch(API,{
    method:"POST",
    body: JSON.stringify({
      action:"delete",
      rowIndex:i+1
    })
  });

  load();
}

load();
</script>
